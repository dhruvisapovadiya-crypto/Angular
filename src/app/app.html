<div class="container">

    <h1 class="title">Personal Profile Cards</h1>

    <button class="add-btn" (click)="addUser()">+ Add Card</button>
    <div class="card-container">
        @for (user of users; track user.id) {
        <app-profile [user]="user" (deleteCard)="deleteUser(user.id)"></app-profile>
        } @empty {
        <p>No users found!!</p>
        }
    </div>


</div>
